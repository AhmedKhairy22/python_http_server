<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>404 - Page Not Found</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial;
    background:#0f2027;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
}

.container{
    text-align:center;
}

h1{
    font-size:80px;
    margin:0;
}

p{
    opacity:0.8;
}

a{
    display:inline-block;
    margin-top:20px;
    padding:10px 20px;
    background:#00d9ff;
    color:black;
    text-decoration:none;
    border-radius:6px;
    font-weight:bold;
}

a:hover{
    background:white;
}

</style>
</head>

<body>

<div class="container">

<h1>404</h1>

<p>The page you requested was not found.</p>

<p>Or the HTTP method used is not allowed.</p>

<a href="/">Go back home</a>

</div>

</body>
</html>
